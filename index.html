<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy 星際盃：計時挑戰賽</title>

  <!-- 1. 載入 Tailwind CSS (處理視覺樣式) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 2. 載入 React 核心程式庫 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- 3. 載入 Babel (瀏覽器即時編譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-in-out forwards;
    }
    input[type="password"].show-number {
      -webkit-text-security: disc;
    }
  </style>
</head>
<body class="bg-[#111827] text-slate-100 font-sans selection:bg-red-500/30">
  
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;
    
    // --- 內部 SVG 圖示元件 (確保離線或 CDN 異常時仍能顯示) ---
    const Icon = ({ children, className, strokeWidth = 2, fill = "none", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Trophy = (p) => <Icon {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
    const Timer = (p) => <Icon {...p}><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></Icon>;
    const Smartphone = (p) => <Icon {...p}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></Icon>;
    const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const Phone = (p) => <Icon {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
    const Send = (p) => <Icon {...p}><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const RefreshCcw = (p) => <Icon {...p}><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21v-5h5"/></Icon>;
    const Star = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
    const Flag = (p) => <Icon {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></Icon>;
    const Lock = (p) => <Icon {...p}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></Icon>;
    const Camera = (p) => <Icon {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></Icon>;

    // Google Apps Script 網址
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyDupulaMXWebWp2cnkULaovpW5cQRJcN47oVmQ1ObcJFA8kqsp9nP7Qh7CmJEpRy1u/exec';

    function App() {
      const [scores, setScores] = useState([]);
      const [loading, setLoading] = useState(true);
      const [connectionStatus, setConnectionStatus] = useState('connecting'); 
      
      const [formData, setFormData] = useState({
        nickname: '', phone: '', minutes: '01', seconds: '30', milliseconds: '000'
      });
      
      const [message, setMessage] = useState({ type: '', text: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [showPinModal, setShowPinModal] = useState(false);
      const [pin, setPin] = useState('');
      const [countdown, setCountdown] = useState(30);

      const secondsRef = useRef(null);
      const millisecondsRef = useRef(null);

      // --- 核心邏輯：獲取排行榜 ---
      const fetchScores = useCallback(async () => {
        try {
          const response = await fetch(`${GAS_URL}?action=getTopScores`, { redirect: 'follow' });
          if (!response.ok) throw new Error();
          const data = await response.json();
          setScores(data);
          setConnectionStatus('connected');
        } catch (error) {
          setConnectionStatus('demo');
          setScores(prev => prev.length ? prev : [
            { id: '1', nickname: '信義車神', timeDisplay: '01:22.430', totalMs: 82430 },
            { id: '2', nickname: '南山夥伴', timeDisplay: '01:25.100', totalMs: 85100 },
            { id: '3', nickname: '星粉小路', timeDisplay: '01:30.050', totalMs: 90050 }
          ]);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchScores();
        const id = setInterval(fetchScores, 15000);
        return () => clearInterval(id);
      }, [fetchScores]);

      // --- 輸入與跳轉 ---
      const handleInputChange = (e) => {
        const { name, value } = e.target;
        if (['phone', 'minutes', 'seconds', 'milliseconds'].includes(name) && !/^\d*$/.test(value)) return;
        if (name === 'phone' && value.length > 10) return;
        if (name === 'minutes' && value.length > 2) return;
        if (name === 'seconds' && value.length > 2) return;
        if (name === 'milliseconds' && value.length > 3) return;

        setFormData(prev => ({ ...prev, [name]: value }));

        if (name === 'minutes' && value.length === 2) secondsRef.current?.focus();
        if (name === 'seconds' && value.length === 2) millisecondsRef.current?.focus();
      };

      // --- 送出流程 ---
      const handlePreSubmit = (e) => {
        e.preventDefault();
        if (!formData.nickname || !formData.phone || formData.phone.length < 9) {
          setMessage({ type: 'error', text: '請完整填寫暱稱與正確的電話格式。' });
          return;
        }
        setPin('');
        setShowPinModal(true);
      };

      const executeSubmit = async () => {
        if (pin !== '6699') {
          alert('密碼錯誤！');
          return;
        }
        setShowPinModal(false);
        setIsSubmitting(true);
        
        const timeDisplay = `${formData.minutes.padStart(2,'0')}:${formData.seconds.padStart(2,'0')}.${formData.milliseconds.padStart(3,'0')}`;
        const totalMs = (parseInt(formData.minutes)*60000) + (parseInt(formData.seconds)*1000) + parseInt(formData.milliseconds);

        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: 'addScore', nickname: formData.nickname, phone: formData.phone, timeDisplay, totalMs }),
            redirect: 'follow'
          });
          const result = await res.json();
          if (result.status === 'success') {
            setIsSubmitted(true);
            fetchScores();
          }
        } catch (e) {
          if (connectionStatus === 'demo') {
            setIsSubmitted(true);
            setScores(prev => [...prev, { id: Date.now(), nickname: formData.nickname, timeDisplay, totalMs }].sort((a,b)=>a.totalMs-b.totalMs).slice(0,3));
          } else {
            alert('送出失敗，請檢查網路。');
          }
        } finally {
          setIsSubmitting(false);
        }
      };

      const resetApp = useCallback(() => {
        setIsSubmitted(false);
        setFormData({ nickname: '', phone: '', minutes: '01', seconds: '30', milliseconds: '000' });
        setMessage({ type: '', text: '' });
      }, []);

      useEffect(() => {
        if (isSubmitted) {
          setCountdown(30);
          const timer = setInterval(() => setCountdown(p => p <= 1 ? (clearInterval(timer), resetApp(), 0) : p - 1), 1000);
          return () => clearInterval(timer);
        }
      }, [isSubmitted, resetApp]);

      return (
        <div className="min-h-screen flex flex-col relative">
          {/* PIN Modal */}
          {showPinModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4">
              <div className="bg-neutral-800 border-8 border-yellow-400 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
                <Lock className="w-12 h-12 text-yellow-400 mx-auto mb-4" />
                <h3 className="text-2xl font-black mb-6">門市夥伴授權</h3>
                <input 
                  type="password" 
                  autoFocus 
                  value={pin} 
                  onChange={e => setPin(e.target.value.replace(/\D/g,'').slice(0,4))}
                  className="w-full bg-black border-4 border-white rounded-xl py-4 text-center text-4xl tracking-widest mb-6 show-number"
                  placeholder="****"
                />
                <div className="flex gap-4">
                  <button onClick={()=>setShowPinModal(false)} className="flex-1 py-3 bg-neutral-600 rounded-xl font-bold">取消</button>
                  <button onClick={executeSubmit} className="flex-1 py-3 bg-yellow-400 text-black rounded-xl font-black">核對上傳</button>
                </div>
              </div>
            </div>
          )}

          <div className="w-full h-3 bg-yellow-400" style={{ backgroundImage: 'repeating-conic-gradient(#000 0% 25%, #fff 0% 50%)', backgroundSize: '20px 20px' }}></div>

          <header className="bg-gradient-to-r from-red-600 to-blue-600 p-6 border-b-8 border-black">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-4">
                <div className="bg-white p-2 rounded-xl border-4 border-black rotate-[-3deg]"><Smartphone className="text-red-500 w-8 h-8" /></div>
                <div>
                  <h1 className="text-3xl font-black drop-shadow-lg">Galaxy 星際盃：<span className="text-yellow-300">計時挑戰賽</span></h1>
                  <p className="text-xs bg-black/30 px-2 py-1 rounded-full inline-block mt-1">微風南山旗艦體驗館</p>
                </div>
              </div>
              <div className={`px-4 py-2 rounded-full border-4 border-black font-bold text-sm bg-white text-black`}>
                {connectionStatus === 'connected' ? '● 連線中' : connectionStatus === 'demo' ? '● 離線/Demo模式' : '○ 載入中'}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto w-full p-4 md:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8 flex-1">
            {/* 左側表單 */}
            <div className="lg:col-span-7">
              <div className="bg-neutral-800 border-4 border-black p-6 md:p-8 rounded-3xl shadow-[8px_8px_0_0_#ef4444] h-full">
                {isSubmitted ? (
                  <div className="text-center py-10 animate-fadeIn">
                    <div className="w-48 h-48 bg-white p-4 mx-auto rounded-2xl border-4 border-black mb-6">
                      <img src="https://github.com/andyhhsu/breeze-galaxycup/blob/main/LINE@%E5%BE%AE%E9%A2%A8%E5%8D%97%E5%B1%B1.png?raw=true" className="w-full h-full object-contain" />
                    </div>
                    <h2 className="text-3xl font-black text-yellow-400 mb-4">太棒了！挑戰成功！</h2>
                    <p className="text-neutral-300 mb-8">請點擊下方按鈕加入 LINE@ 領取體驗禮</p>
                    <a href="https://line.me/R/ti/p/@756lijxt" target="_blank" className="inline-block bg-blue-600 px-8 py-4 rounded-2xl font-black text-xl border-4 border-blue-900 shadow-lg active:translate-y-1 mb-8">👉 點此加入 LINE@ 領獎</a>
                    <div className="text-neutral-500 font-bold">{countdown} 秒後自動重置...</div>
                  </div>
                ) : (
                  <form onSubmit={handlePreSubmit} className="space-y-6">
                    <div className="flex items-center gap-3 border-b-2 border-neutral-700 pb-4 mb-6">
                      <Flag className="text-red-500" /><h2 className="text-2xl font-black">完賽成績登記</h2>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div>
                        <label className="block text-sm font-bold text-neutral-400 mb-2">遊戲暱稱</label>
                        <input name="nickname" value={formData.nickname} onChange={handleInputChange} className="w-full bg-black border-4 border-black rounded-xl p-3 font-bold focus:border-blue-500 outline-none" placeholder="例如：南山車神" />
                      </div>
                      <div>
                        <label className="block text-sm font-bold text-neutral-400 mb-2">聯絡電話</label>
                        <input name="phone" value={formData.phone} onChange={handleInputChange} className="w-full bg-black border-4 border-black rounded-xl p-3 font-bold focus:border-blue-500 outline-none" placeholder="0912345678" />
                      </div>
                    </div>
                    <div className="bg-black border-4 border-black p-6 rounded-2xl">
                       <label className="block text-center text-sm font-bold text-red-400 mb-4">完賽時間 (分:秒.毫秒)</label>
                       <div className="flex items-center justify-center gap-2 md:gap-4">
                         <input name="minutes" value={formData.minutes} onChange={handleInputChange} className="w-20 bg-transparent text-4xl md:text-5xl font-black text-center outline-none border-b-4 border-neutral-800 focus:border-yellow-400" />
                         <span className="text-4xl font-black">:</span>
                         <input name="seconds" ref={secondsRef} value={formData.seconds} onChange={handleInputChange} className="w-20 bg-transparent text-4xl md:text-5xl font-black text-center outline-none border-b-4 border-neutral-800 focus:border-yellow-400" />
                         <span className="text-4xl font-black">.</span>
                         <input name="milliseconds" ref={millisecondsRef} value={formData.milliseconds} onChange={handleInputChange} className="w-24 bg-transparent text-4xl md:text-5xl font-black text-center outline-none border-b-4 border-neutral-800 focus:border-yellow-400" />
                       </div>
                    </div>
                    <button type="submit" className="w-full bg-green-500 py-5 rounded-2xl text-2xl font-black border-b-8 border-green-900 active:border-b-0 active:translate-y-1 transition-all">送出成績</button>
                  </form>
                )}
              </div>
            </div>

            {/* 右側排行榜 */}
            <div className="lg:col-span-5">
              <div className="bg-neutral-800 border-4 border-black p-6 rounded-3xl shadow-[8px_8px_0_0_#3b82f6] h-full">
                <div className="flex items-center gap-2 mb-4">
                  <Star className="text-yellow-400 fill-yellow-400" />
                  <h2 className="text-xl font-black">極速神人榜 <span className="text-sm text-yellow-300 block md:inline">(特別杯-庫巴城堡)</span></h2>
                </div>

                {/* 📸 拍照提醒區塊 */}
                {!isSubmitted && (
                  <div className="bg-blue-600 border-4 border-black rounded-xl p-3 mb-6 flex items-start gap-3 animate-fadeIn">
                    <Camera className="w-10 h-10 shrink-0" />
                    <p className="text-sm font-bold leading-tight">找門市夥伴登記成績時，<span className="text-yellow-200 underline">請務必先拍下完賽畫面</span>，以免紀錄被洗掉喔！</p>
                  </div>
                )}

                <div className="space-y-3">
                  {loading ? <div className="text-center py-10 animate-pulse text-neutral-500">載入排行中...</div> : 
                    scores.map((s, i) => (
                      <div key={s.id} className={`flex items-center p-3 rounded-xl border-4 border-black ${i===0?'bg-yellow-400 text-black':i===1?'bg-slate-300 text-black':i===2?'bg-orange-400 text-black':'bg-neutral-700'}`}>
                        <div className="w-8 h-8 rounded-lg bg-black/20 flex items-center justify-center font-black mr-3">{i+1}</div>
                        <div className="flex-1 font-black truncate">{s.nickname}</div>
                        <div className="font-mono font-black">{s.timeDisplay}</div>
                      </div>
                    ))
                  }
                </div>

                <div className="mt-8 pt-6 border-t-2 border-neutral-700">
                  <p className="text-xs font-black text-yellow-400 mb-3 tracking-widest uppercase">🏆 最終大獎</p>
                  <ul className="text-xs space-y-2 font-bold text-neutral-300">
                    <li>● 冠軍: 20,000mAh 行動電源</li>
                    <li>● 亞軍: 保溫跳跳吸管杯</li>
                    <li>● 季軍: 放鬆筋膜槍</li>
                  </ul>
                </div>
              </div>
            </div>
          </main>
          
          <footer className="p-6 text-center text-neutral-600 text-xs font-bold">© 2026 三星旗艦體驗館-微風南山限定</footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
